<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Gemio ERP 自然語言查詢</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <style>
    body { background: #f0f2f5; }

    /* ── 1 抬頭 */
    .site-header {
      background: linear-gradient(135deg, #1a3c6e 0%, #2563eb 100%);
      color: #fff;
      padding: 1.2rem 2rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      box-shadow: 0 2px 8px rgba(0,0,0,.25);
    }
    .site-header h1 { font-size: 1.5rem; margin: 0; font-weight: 700; }
    .site-header small { opacity: .75; font-size: .85rem; }

    .main-card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,.08);
      padding: 1.5rem;
      margin-bottom: 1.25rem;
    }

    /* ── SQL 顯示 */
    pre.sql-box {
      background: #1e293b;
      color: #7dd3fc;
      border-radius: 8px;
      padding: 1rem;
      font-size: .875rem;
      white-space: pre-wrap;
      word-break: break-all;
      max-height: 200px;
      overflow-y: auto;
    }

    /* ── 表格 */
    .result-table { font-size: .875rem; }
    .result-table thead th {
      background: #1a3c6e;
      color: #fff;
      position: sticky;
      top: 0;
      z-index: 2;
    }
    .result-table tfoot td {
      background: #e8f0fe;
      font-weight: 700;
    }
    .table-wrap {
      max-height: 420px;
      overflow-y: auto;
      border-radius: 8px;
      border: 1px solid #dee2e6;
    }

    /* ── 可查表清單 */
    .table-badge {
      font-size: .75rem;
      cursor: pointer;
    }
    .table-badge:hover { opacity: .8; }

    /* ── 載入指示 */
    #loading-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,.4);
      z-index: 9999;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      color: #fff;
      font-size: 1.2rem;
      gap: 1rem;
    }
    #loading-overlay.htmx-request { display: flex !important; }
  </style>
</head>
<body>

<!-- ═══ 1. 抬頭 ══════════════════════════════════════════════ -->
<div class="site-header">
  <svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" fill="currentColor"
       class="bi bi-database-check" viewBox="0 0 16 16">
    <path d="M12.5 16a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7m1.679-4.493-1.335 2.226a.75.75 0 0 1-1.174.144l-.774-.773a.5.5 0 0 1 .708-.707l.547.547 1.17-1.951a.5.5 0 1 1 .858.514"/>
    <path d="M12.096 6.223A4.9 4.9 0 0 0 13 5.698V7c0 .289-.213.654-.753 1.007a4.5 4.5 0 0 1 1.753.25V4c0-1.007-.875-1.755-1.904-2.223C11.022 1.289 9.573 1 8 1s-3.022.289-4.096.777C2.875 2.245 2 2.993 2 4v9c0 1.007.875 1.755 1.904 2.223C4.978 15.71 6.427 16 8 16c.536 0 1.058-.034 1.555-.097a4.5 4.5 0 0 1-.813-.927Q8.378 15 8 15c-1.464 0-2.766-.27-3.682-.687C3.356 13.875 3 13.373 3 13v-1.302c.271.202.58.378.904.525C4.978 12.71 6.427 13 8 13h.027a4.6 4.6 0 0 1 0-1H8c-1.464 0-2.766-.27-3.682-.687C3.356 10.875 3 10.373 3 10V8.698c.271.202.58.378.904.525C4.978 9.71 6.427 10 8 10q.932 0 1.8-.139a4.5 4.5 0 0 1 1.017-1.328C10.139 8.546 9.107 8.7 8 8.7c-1.464 0-2.766-.27-3.682-.687C3.356 7.875 3 7.373 3 7V5.698c.271.202.58.378.904.525C4.978 6.71 6.427 7 8 7s3.022-.289 4.096-.777M3 4c0-.374.356-.875 1.318-1.313C5.234 2.271 6.536 2 8 2s2.766.27 3.682.687C12.644 3.125 13 3.627 13 4c0 .374-.356.875-1.318 1.313C10.766 5.729 9.464 6 8 6s-2.766-.27-3.682-.687C3.356 4.875 3 4.373 3 4"/>
  </svg>
  <div>
    <h1>Gemio ERP 自然語言查詢</h1>
    <small>以自然語言描述需求，系統自動轉換為 SQL 查詢</small>
  </div>
</div>

<!-- ═══ 全域載入遮罩 ══════════════════════════════════════════ -->
<div id="loading-overlay" hx-indicator="">
  <div class="spinner-border text-light" style="width:3.5rem;height:3.5rem;" role="status"></div>
  <span>系統查詢中，請稍候…</span>
</div>

<div class="container-fluid py-3 px-3 px-md-4">
  <div class="row g-3">

    <!-- ═══ 左欄：輸入 + 結果 + SQL ══════════════════════════ -->
    <div class="col-12 col-xl-9">

      <!-- ── 2. 輸入框 ────────────────────────────────────── -->
      <div class="main-card">
        <label class="form-label fw-semibold text-secondary small text-uppercase mb-2">
          輸入查詢需求
        </label>
        <form hx-post="/query"
              hx-target="#result-area"
              hx-swap="innerHTML"
              hx-indicator="#loading-overlay"
              autocomplete="off">
          <div class="input-group shadow-sm">
            <input type="text"
                   name="question"
                   id="question-input"
                   class="form-control form-control-lg"
                   placeholder="例：查詢本月所有採購訂單，按日期排序"
                   required>
            <button class="btn btn-primary px-4" type="submit">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor"
                   class="me-1" viewBox="0 0 16 16">
                <path d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001q.044.06.098.115l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85a1 1 0 0 0-.115-.099zm-5.242 1.156a5.5 5.5 0 1 1 0-11 5.5 5.5 0 0 1 0 11"/>
              </svg>
              查詢
            </button>
          </div>
        </form>
      </div>

      <!-- ── 3 & 4. 結果 + SQL（由 HTMX 填入） ──────────────── -->
      <div id="result-area">
        <!-- 初始提示 -->
        <div class="main-card text-center text-muted py-5">
          <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" fill="currentColor"
               class="text-secondary mb-3 opacity-50" viewBox="0 0 16 16">
            <path d="M8 15A7 7 0 1 1 8 1a7 7 0 0 1 0 14m0 1A8 8 0 1 0 8 0a8 8 0 0 0 0 16"/>
            <path d="m8.93 6.588-2.29.287-.082.38.45.083c.294.07.352.176.288.469l-.738 3.468c-.194.897.105 1.319.808 1.319.545 0 1.178-.252 1.465-.598l.088-.416c-.2.176-.492.246-.686.246-.275 0-.375-.193-.304-.533zM9 4.5a1 1 0 1 1-2 0 1 1 0 0 1 2 0"/>
          </svg>
          <p class="mb-0">請在上方輸入查詢需求，結果將顯示於此</p>
        </div>
      </div>

    </div><!-- /左欄 -->

    <!-- ═══ 5. 右欄：可查詢的表 ═══════════════════════════════ -->
    <div class="col-12 col-xl-3">
      <div class="main-card h-100">
        <div class="d-flex justify-content-between align-items-center mb-3">
          <h6 class="fw-bold mb-0 text-secondary small text-uppercase">
            可查詢的資料表 / 檢視表
          </h6>
          <button class="btn btn-outline-secondary btn-sm"
                  hx-post="/refresh-schema"
                  hx-swap="none"
                  title="重新載入 Schema">
            ↻
          </button>
        </div>

        {% if tables %}
          <div class="d-flex flex-wrap gap-1">
            {% for t in tables %}
              <span class="badge table-badge
                    {% if t.type == 'VIEW' %}bg-success{% else %}bg-primary{% endif %}"
                    title="{{ t.type }}"
                    onclick="document.getElementById('question-input').value = '查詢 {{ t.name }}';
                             document.getElementById('question-input').focus();">
                {{ t.name }}
              </span>
            {% endfor %}
          </div>
          <div class="mt-3 d-flex gap-2 flex-wrap">
            <span class="badge bg-primary">BASE TABLE</span>
            <span class="badge bg-success">VIEW</span>
          </div>
        {% else %}
          <p class="text-muted small">（無法連線資料庫，Schema 尚未載入）</p>
        {% endif %}
      </div>
    </div>

  </div><!-- /row -->
</div><!-- /container -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
